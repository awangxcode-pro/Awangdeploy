    <script>
        if(localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        }
        (function() {
            function tryIcon(formats, index) {
                if (index >= formats.length) return;
                var img = new Image();
                img.onload = function() {
                    var main = document.getElementById('faviconMain');
                    var apple = document.getElementById('faviconApple');
                    if (main) { main.type = formats[index].type; main.href = formats[index].href; }
                    if (apple) { apple.href = formats[index].href; }
                };
                img.onerror = function() {
                    tryIcon(formats, index + 1);
                };
                img.src = formats[index].href;
            }
            tryIcon([
                { href: 'assets/images/icon.png', type: 'image/png' },
                { href: 'assets/images/icon.jpg', type: 'image/jpeg' }
            ], 0);
        })();
    </script>

<body oncontextmenu="return false">

    <div id="bg-base"></div>

    <div class="main-container email-page-container">

        <div class="contact-top-bar-modern">
            <a href="/" class="back-btn-modern">
                <i class="fas fa-arrow-left"></i> <span>Kembali</span>
            </a>
            <div class="status-pill-modern">

        <div class="contact-profile-card">

        <div id="cpDropdown" class="cp-dropdown">

            <div class="cp-drop-item">

                </div>
            </div>
            <div class="cp-drop-item">

                    <div class="cp-icon-box em-color"><i class="fas fa-envelope"></i></div>

        </div>

        <div class="email-card-glass">
            <h3>Kirim Pesan Langsung</h3>

            <div class="form-group-custom">
                <label class="form-label-custom">Nama Lengkap / Panggilan</label>
                <input type="text" id="ticketName" class="form-control-custom" placeholder="Ketik nama Anda di sini...">
            </div>

            <div class="form-group-custom">
                <label class="form-label-custom">Pilih Topik Pembicaraan</label>
                <div class="category-grid-modern">
                    <button id="cat-bug" class="cat-btn-modern active" onclick="selectCategory('bug')">
                        Laporan Bug
                    </button>
                    <button id="cat-tanya" class="cat-btn-modern" onclick="selectCategory('tanya')">
                        Pertanyaan
                    </button>
                    <button id="cat-collab" class="cat-btn-modern" onclick="selectCategory('collab')">
                        Kolaborasi
                    </button>
                    <button id="cat-lain" class="cat-btn-modern" onclick="selectCategory('lain')">
                        Lainnya
                    </button>
                </div>
            </div>

            <div class="form-group-custom">
                <label class="form-label-custom">Detail Pesan</label>
                <textarea id="ticketMsg" class="form-control-custom form-textarea-custom" placeholder="Jelaskan keperluan Anda secara rinci..."></textarea>
            </div>

            <button id="submitTicketBtn" class="btn-submit-modern" onclick="submitTicket()">
